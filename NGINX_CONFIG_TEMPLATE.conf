# NGINX Configuration for Foro Agora SPA
# ⚠️ DEPLOYMENT SERVERS: Use this configuration on your NGINX server
# This handles all client-side routes by serving index.html

server {
    listen 80;
    server_name your_domain.com www.your_domain.com;

    root /path/to/foro-agora/dist;
    index index.html index.htm;

    # THE FIX: Serve index.html for all non-file routes
    # This allows React Router to handle all routing client-side
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets with long expiry
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache HTML files
    location ~* \.html?$ {
        expires -1;
        add_header Cache-Control "public, must-revalidate";
    }

    # HTTPS redirect (uncomment after SSL is set up)
    # if ($scheme != "https") {
    #     return 301 https://$server_name$request_uri;
    # }
}
